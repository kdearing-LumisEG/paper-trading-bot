symbol: SPY
timeframe_minutes: 15
data_feed: iex

strategy:
  name: ema_crossover_9_21
  fast_ema: 9
  slow_ema: 21

paper_execution:
  quantity: 1
  poll_interval_seconds: 1.0
  max_poll_attempts: 10
  cancellation_confirmation_poll_seconds: 1.0
  cancellation_confirmation_timeout_seconds: 10.0

  # Educational paper-trading guardrails. Tune only after testing.
  max_daily_loss: 25.0
  max_trades_per_session: 3
  max_consecutive_losses: 2

  order_log_path: logs/execution/paper_orders.jsonl
  decision_log_path: logs/execution/signal_decisions.jsonl
  risk_state_path: logs/execution/session_risk_state.json
  order_state_path: logs/execution/order_state.json
  lifecycle_log_path: logs/execution/order_lifecycle.jsonl

market_signal:
  lookback_calendar_days: 14
  bar_staleness_grace_seconds: 120.0
  flatten_minutes_before_close: 15
  signal_state_path: logs/execution/market_signal_state.json

reconciliation:
  position_state_path: logs/execution/position_state.json
  report_log_path: logs/execution/reconciliation.jsonl
  process_lock_path: logs/execution/runtime.lock
  average_price_tolerance: 0.01
